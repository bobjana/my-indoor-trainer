services:
  app:
    build:
      context: .
      args:
        - VITE_STRAVA_CLIENT_ID=${VITE_STRAVA_CLIENT_ID:-}
        - VITE_STRAVA_CLIENT_SECRET=${VITE_STRAVA_CLIENT_SECRET:-}
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
    restart: unless-stopped
    environment:
      - PORT=5173

