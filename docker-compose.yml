services:
  app:
    build:
      context: .
      args:
        - VITE_STRAVA_CLIENT_ID=${VITE_STRAVA_CLIENT_ID:-}
        - VITE_STRAVA_CLIENT_SECRET=${VITE_STRAVA_CLIENT_SECRET:-}
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
    restart: unless-stopped
    environment:
      - PORT=5173

  stub-trainer:
    build:
      context: .
    command: node stub-server/server.js
    ports:
      - "8080:8080"
    restart: unless-stopped
    stdin_open: true # allows interacting with the stub CLI
    tty: true
